<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat – mindAIry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chatbot.css" />
</head>
<body>
 
<header>
  <nav>
    <ul>
      <li class="logo">
        <a href="#">
          <img src="journaling logo.png" alt="Logo">
          <span>MoodMate</span>
        </a>
      </li>
      <li><a href="index.html">Home</a></li>
      <li><a href="journal.html">Journal</a></li>
      <li><a href="insights.html">Insights</a></li>
      <li><a href="chatbot.html">Chatbot</a></li>
      <li id="auth-li"></li>
    </ul>
  </nav>
</header>
 
<div class="chat-layout">
 
  <!-- SIDEBAR -->
  <aside class="chat-sidebar">
    <div class="sidebar-top">
      <div class="bot-avatar">🌸</div>
      <h2 class="bot-name">Maia</h2>
      <p class="bot-tagline">Your MoodMate companion</p>
    </div>
 
    <div class="sidebar-section">
      <p class="sidebar-label">Quick prompts</p>
      <div class="quick-btns" id="quickBtns">
        <button class="quick-btn">How am I feeling lately?</button>
        <button class="quick-btn">Give me a journal prompt</button>
        <button class="quick-btn">I need to vent</button>
        <button class="quick-btn">What patterns do you see?</button>
        <button class="quick-btn">Help me reflect on today</button>
        <button class="quick-btn">I'm feeling overwhelmed</button>
      </div>
    </div>
 
    <div class="sidebar-section">
      <p class="sidebar-label">Journal context</p>
      <div class="context-info" id="contextInfo">
        <div class="context-stat">
          <span class="cs-icon">📓</span>
          <span class="cs-text" id="ctxEntries">0 entries</span>
        </div>
        <div class="context-stat">
          <span class="cs-icon">🔥</span>
          <span class="cs-text" id="ctxStreak">0 day streak</span>
        </div>
        <div class="context-stat">
          <span class="cs-icon">💜</span>
          <span class="cs-text" id="ctxMood">No mood logged</span>
        </div>
      </div>
    </div>
 
    <button class="clear-btn" id="clearChat">↺ New conversation</button>
  </aside>
 
  <!-- MAIN CHAT -->
  <main class="chat-main">
 
    <!-- Messages -->
    <div class="messages" id="messages">
      <!-- Populated by JS -->
    </div>
 
    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-avatar">🌸</div>
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
 
    <!-- Input -->
    <div class="chat-input-wrap">
      <textarea
        id="chatInput"
        placeholder="Talk to Maia…"
        rows="1"
        maxlength="2000"
      ></textarea>
      <button id="sendBtn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
 
  </main>
</div>
</div>
 
<!-- GROQ KEY MODAL -->
<div id="chat-key-modal" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(30,0,50,0.5);backdrop-filter:blur(5px)">
  <div style="background:white;border-radius:24px;padding:36px 32px;max-width:420px;width:90%;box-shadow:0 24px 60px rgba(60,15,81,0.28);text-align:center;animation:authPop 0.28s ease both">
    <div style="font-size:36px;margin-bottom:12px">🔑</div>
    <h2 style="font-family:'Lora',serif;font-size:22px;color:rgb(60,15,81);margin-bottom:8px">Groq API Key</h2>
    <p style="font-size:14px;color:rgb(120,80,140);margin-bottom:20px">Paste your Groq key to chat with Maia. Get a free key at <a href="https://console.groq.com" target="_blank" style="color:rgb(94,41,119);font-weight:700">console.groq.com</a></p>
    <input type="password" id="chat-key-input" placeholder="gsk_..." style="width:100%;padding:11px 14px;border-radius:12px;border:2px solid rgb(234,219,244);font-size:14px;outline:none;box-sizing:border-box;margin-bottom:8px"/>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
      <button id="chat-key-cancel" style="padding:10px 22px;border-radius:50px;border:2px solid #ddd;background:transparent;font-size:14px;font-weight:600;cursor:pointer">Cancel</button>
      <button id="chat-key-save" style="padding:10px 22px;border-radius:50px;border:none;background:rgb(60,15,81);color:white;font-size:14px;font-weight:600;cursor:pointer">Save & Chat 💬</button>
    </div>
  </div>
</div>
 
<script src="auth.js"></script>
<script src="chatbot.js"></script>
</body>
</html>
